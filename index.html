<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Focus Mode UI -->
    <div class="focus-mode-indicator" id="focus-indicator">Focus Mode</div>
    <div class="focus-time" id="focus-time"></div>
    <div class="focus-toggle-hint">Press F to toggle focus mode</div>

    <!-- Shiva Divine Presence -->
    <div class="shiva-presence" id="shiva-presence">
      <!-- Trishul (Trident) -->
      <svg
        class="trishul"
        viewBox="0 0 80 100"
        preserveAspectRatio="xMidYMid meet"
      >
        <defs>
          <linearGradient id="trishulGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(200, 180, 160, 0.6)" />
            <stop offset="50%" stop-color="rgba(160, 140, 120, 0.4)" />
            <stop offset="100%" stop-color="rgba(120, 100, 80, 0.1)" />
          </linearGradient>
        </defs>
        <!-- Center prong -->
        <path
          d="M40 5 L38 25 L40 22 L42 25 Z"
          fill="url(#trishulGrad)"
          stroke="rgba(180,160,140,0.5)"
          stroke-width="0.5"
        />
        <!-- Left prong -->
        <path
          d="M25 18 L28 32 L32 28 Z"
          fill="url(#trishulGrad)"
          stroke="rgba(180,160,140,0.4)"
          stroke-width="0.5"
        />
        <!-- Right prong -->
        <path
          d="M55 18 L52 32 L48 28 Z"
          fill="url(#trishulGrad)"
          stroke="rgba(180,160,140,0.4)"
          stroke-width="0.5"
        />
        <!-- Curved crossbar -->
        <path
          d="M28 32 Q40 38 52 32"
          fill="none"
          stroke="rgba(180,160,140,0.5)"
          stroke-width="1.5"
        />
        <!-- Handle -->
        <line
          x1="40"
          y1="36"
          x2="40"
          y2="95"
          stroke="url(#trishulGrad)"
          stroke-width="2"
        />
      </svg>

      <!-- Shiva Eyes Container -->
      <div class="shiva-eyes" id="shiva-eyes">
        <!-- Left Eye -->
        <div class="shiva-eye left-eye">
          <div class="eye-socket">
            <div class="eye-white">
              <div class="eye-iris">
                <div class="eye-pupil" id="left-pupil">
                  <div class="pupil-highlight"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Third Eye (Center) -->
        <div class="third-eye">
          <div class="third-eye-outer">
            <div class="third-eye-inner">
              <div class="third-eye-core"></div>
            </div>
          </div>
        </div>

        <!-- Right Eye -->
        <div class="shiva-eye right-eye">
          <div class="eye-socket">
            <div class="eye-white">
              <div class="eye-iris">
                <div class="eye-pupil" id="right-pupil">
                  <div class="pupil-highlight"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Animated Background -->
    <canvas id="bg-canvas"></canvas>
    <div class="presence-orb orb-1"></div>
    <div class="presence-orb orb-2"></div>
    <div class="presence-orb orb-3"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- Focus Axis -->
    <div class="focus-axis"></div>

    <div class="container">
      <!-- Header: Identity -->
      <header class="header">
        <div class="identity">
          <h1 class="name">Rudra Thacker</h1>
          <p class="quote" id="daily-quote"></p>
        </div>
      </header>

      <!-- Timeline Calendar (Right Side) -->
      <div class="timeline" id="timeline">
        <div class="timeline-today">
          <div class="timeline-today-day" id="timeline-day"></div>
          <div class="timeline-today-date" id="timeline-date"></div>
        </div>

        <div class="current-time-display">
          <div class="time-main" id="time-main"></div>
          <div class="time-period" id="time-period"></div>
          <div class="time-seconds" id="time-seconds"></div>
          <div class="time-decoration"></div>
        </div>
      </div>

      <!-- Main: Search -->
      <main class="main-content">
        <div class="search-container">
          <input
            type="text"
            class="search-bar"
            id="search-input"
            placeholder="Search or enter URL..."
            autocomplete="off"
            autofocus
          />
          <span class="search-hint">Enter ↵</span>
        </div>
      </main>

      <!-- Footer: Apps -->
      <footer class="footer">
        <div class="apps-wrapper">
          <!-- Core Apps -->
          <div class="app-group">
            <span class="app-group-label">Core</span>
            <div class="app-icons">
              <a href="https://mail.google.com" class="app-icon" title="Gmail">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
                  />
                </svg>
              </a>
              <a href="https://youtube.com" class="app-icon" title="YouTube">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77C22 15.25 22 12 22 12s0-3.25-.42-4.81zM10 15V9l5.2 3-5.2 3z"
                  />
                </svg>
              </a>
              <a href="https://github.com" class="app-icon" title="GitHub">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.56-1.11-4.56-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0112 6.8c.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85v2.75c0 .27.18.58.69.48A10.02 10.02 0 0022 12c0-5.52-4.48-10-10-10z"
                  />
                </svg>
              </a>
              <a
                href="https://drive.google.com"
                class="app-icon"
                title="Google Drive"
              >
                <svg viewBox="0 0 24 24">
                  <path
                    d="M8.71 7.71L3 17h5.29l5.71-9.29L8.71 7.71zM14.29 7.71L9 17h12l-5.29-9.29-1.42 0zM12 4L7.71 7.71h8.58L12 4z"
                  />
                </svg>
              </a>
            </div>
          </div>

          <!-- AI Apps -->
          <div class="app-group">
            <span class="app-group-label">AI</span>
            <div class="app-icons">
              <a
                href="https://chat.openai.com"
                class="app-icon"
                title="ChatGPT"
              >
                <svg viewBox="0 0 24 24">
                  <path
                    d="M22.28 10.85c.28-.78.42-1.6.42-2.43 0-1.55-.48-3.06-1.37-4.33a7.59 7.59 0 00-6.53-3.47c-1.15 0-2.28.26-3.31.75a7.52 7.52 0 00-5.69-.49 7.59 7.59 0 00-4.91 4.75 7.52 7.52 0 00-.49 5.69 7.5 7.5 0 00-.42 2.43c0 1.55.48 3.06 1.37 4.33a7.59 7.59 0 006.53 3.47c1.15 0 2.28-.26 3.31-.75a7.52 7.52 0 005.69.49 7.59 7.59 0 004.91-4.75 7.52 7.52 0 00.49-5.69zm-10.28 8.4c-1.23 0-2.42-.36-3.44-1.03l.17-.1 5.72-3.3c.29-.17.47-.48.47-.82V8.67l2.42 1.4v6.68a5.77 5.77 0 01-5.34 2.5zm-7.79-4.49a5.72 5.72 0 01-.69-2.74V5.34c0-.28.16-.54.42-.67l5.72-3.3c.26-.15.58-.15.84 0l5.72 3.3a.78.78 0 01.42.67v6.68c0 .28-.16.54-.42.67l-5.72 3.3a.8.8 0 01-.84 0l-5.45-3.13z"
                  />
                </svg>
              </a>
              <a href="https://claude.ai" class="app-icon" title="Claude">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
                  />
                </svg>
              </a>
              <a
                href="https://gemini.google.com"
                class="app-icon"
                title="Gemini"
              >
                <svg viewBox="0 0 24 24">
                  <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z" />
                </svg>
              </a>
              
              <a
                href="https://www.perplexity.ai"
                class="app-icon"
                title="Perplexity"
              >
                <svg viewBox="0 0 24 24">
                  <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"
                  />
                </svg>
              </a>
            </div>
          </div>

          <!-- My Apps -->
          <div class="app-group">
            <span class="app-group-label">My Apps</span>
            <div class="app-icons" id="my-apps-container">
              <!-- Custom apps will be added here -->
              <button
                class="app-icon add-app-btn"
                id="add-app-btn"
                title="Add App"
              >
                <svg viewBox="0 0 24 24">
                  <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <!-- Add App Modal -->
    <div class="modal-overlay" id="add-app-modal">
      <div class="modal-content">
        <h3>Add New App</h3>
        <input
          type="text"
          id="app-name-input"
          placeholder="App Name (e.g., Spotify)"
        />
        <input
          type="url"
          id="app-url-input"
          placeholder="App URL (e.g., https://spotify.com)"
        />
        <div class="modal-buttons">
          <button class="modal-btn cancel-btn" id="cancel-add-app">
            Cancel
          </button>
          <button class="modal-btn confirm-btn" id="confirm-add-app">
            Add
          </button>
        </div>
      </div>
    </div>

    <script src="newtab.js"></script>
  </body>
</html>
